<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="냠냠밸런스 조미진 대표의 공식 프로필 링크입니다.">
    <title>조미진 | 냠냠밸런스</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Background decorative elements -->
        <div class="blob shape1"></div>
        <div class="blob shape2"></div>
        
        <main class="profile-card">
            <header class="profile-header">
                <div class="profile-image-container">
                    <img src="profile.jpg" alt="조미진 대표님" class="profile-image">
                </div>
                <h1 class="profile-name">조미진</h1>
                <p class="profile-title">냠냠밸런스 대표</p>
                <div class="divider"></div>
            </header>

            <section class="links-section">
                <!-- Instagram: Solid brand color (#FFB347) with Shine Effect -->
                <a href="https://www.instagram.com/nyamnyam_balance/" target="_blank" rel="noopener noreferrer" class="link-btn primary-btn shine-effect scale-effect">
                    <i class="fa-brands fa-instagram"></i>
                    <span>인스타그램</span>
                </a>
                
                <!-- Secondary Link: Bordered -->
                <a href="https://map.naver.com/p/entry/place/1187579585?placePath=/home?from=map&fromPanelNum=1&additionalHeight=76&timestamp=202604082114&locale=ko&svcName=map_pcv5&c=15.00,0,0,0,dh" target="_blank" rel="noopener noreferrer" class="link-btn secondary-btn scale-effect">
                    <i class="fa-regular fa-calendar-check"></i>
                    <span>예약하러 가기</span>
                </a>
                
                <!-- Tertiary Link: Bordered -->
                <a href="https://blog.naver.com/naymbalance" target="_blank" rel="noopener noreferrer" class="link-btn secondary-btn scale-effect">
                    <i class="fa-solid fa-blog"></i>
                    <span>냠냠밸런스 블로그</span>
                </a>
            </section>
        </main>
        
        <footer class="app-footer">
            <p>&copy; 2024 냠냠밸런스. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
